[project]
site_name = "Credential Bridge"
site_description = "A Python library for unified secrets management across HashiCorp Vault, system keyring, and .env files."
site_author = "Vertex AI Automations"
site_url = "https://vertex-ai-automations.github.io/credential-bridge"
site_dir = "public"
docs_dir = "docs"
use_directory_urls = true
repo_name = "credential-bridge"
repo_url = "https://github.com/vertex-ai-automations/credential-bridge"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2024-2026 Vertex AI Automations"

extra_css = ["css/extra.css"]
extra_javascript = ["js/extra.js"]

nav = [
  { "Overview" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Quick Start" = "getting-started/quickstart.md" },
  ]},
  { "Backends" = [
    { "Comparison" = "backends/comparison.md" },
    { "HashiCorp Vault" = "backends/vault.md" },
    { "System Keyring" = "backends/keyring.md" },
    { ".env File" = "backends/env-file.md" },
  ]},
  { "CLI Reference" = [
    { "Unified CLI (cb)" = "cli/cb.md" },
    { "Vault CLI" = "cli/vault.md" },
    { "Keyring CLI" = "cli/keyring.md" },
    { ".env CLI" = "cli/env.md" },
  ]},
  { "Interactive Wizard" = "wizard.md" },
  { "SecretsManager" = "secrets-manager.md" },
  { "API Reference" = [
    { "SecretsManager" = "reference/secrets_manager.md" },
    { "BaseSecretBackend" = "reference/base.md" },
    { "VaultBackend" = "reference/vault_backend.md" },
    { "KeyringBackend" = "reference/keyring_backend.md" },
    { "EnvFileBackend" = "reference/env_file_backend.md" },
    { "Exceptions" = "reference/exceptions.md" },
  ]},
]

# ── Theme ────────────────────────────────────────────────────────────────────
[project.theme]
# "modern" = new Zensical design  |  "classic" = traditional Material for MkDocs
variant = "modern"
language = "en"
favicon = "img/favicon/favicon.ico"

features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.icon]
logo = "lucide/shield-check"
repo = "fontawesome/brands/github"
edit = "lucide/pencil"
view = "lucide/eye"

[project.theme.font]
text = "DM Sans"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

# ── Extra ────────────────────────────────────────────────────────────────────
[project.extra]
generator = false

# ── Social links ─────────────────────────────────────────────────────────────
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/vertex-ai-automations/credential-bridge"
name = "Credential Bridge on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/credential-bridge/"
name = "Credential Bridge on PyPI"

# ── Plugins ──────────────────────────────────────────────────────────────────
[project.plugins.search]

[project.plugins.autorefs]
resolve_closest = true

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "numpy"
docstring_section_style = "spacy"
filters = ["!^_"]
heading_level = 2
inherited_members = false
merge_init_into_class = true
parameter_headings = true
show_root_heading = true
show_root_full_path = false
show_signature = true
show_signature_annotations = true
show_source = true
show_symbol_type_heading = true
show_symbol_type_toc = true
signature_crossrefs = true
summary = true
members_order = "source"

[project.plugins.mkdocstrings.handlers.python.options.docstring_options]
ignore_init_summary = true

# ── Markdown extensions ──────────────────────────────────────────────────────
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
permalink_title = "Link to this section"
toc_depth = 3

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"

[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
auto_title = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.magiclink]
normalize_issue_symbols = true
repo_url_shorthand = true
user = "vertex-ai-automations"
repo = "pylogshield"

[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["docs/includes"]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]
